server:
  port: 8087
  # 超时配置
  tomcat:
    connection-timeout: 60000   # 连接超时60秒
    threads:
      max: 100                  # 最大线程数
spring:
  main:
    allow-bean-definition-overriding: true  # 允许Bean定义覆盖
  # Jackson JSON配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${OPENAI_API_KEY:sk-temp-key-for-testing}
      chat:
        options:
          model: qwen-max-latest
      embedding:
        options:
          model: text-embedding-v3
          dimensions: 1024
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always  # 自动初始化表结构
            schema: classpath:schema-mysql.sql
    # Chroma向量存储配置
    vectorstore:
      chroma:
        client:
          host: http://localhost
          port: 8000
        collection-name: unilife_collection
        initialize-schema: true
  datasource:
    url: jdbc:mysql://localhost:3306/UniLife?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: smtp.163.com
    port: 465
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            port: 465
            class: javax.net.ssl.SSLSocketFactory
    # Redis基本配置（用于缓存等功能）
    data:
      redis:
        port: 6379
        host: 127.0.0.1
        database: 0
        timeout: 10000ms
        lettuce:
          pool:
            max-active: 8
            max-wait: -1ms
            max-idle: 8
            min-idle: 0

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
    session:
      timeout: 30m              # 会话超时30分钟
knife4j:
  enable: true
  openapi:
    title: Knife4j官方文档
    description: "测试"
    email: xiaoymin@foxmail.com
    concat: 八一菜刀
    url: https://docs.xiaominfo.com
    version: v4.0
    license: Apache 2.0
    license-url: https://stackoverflow.com/
    terms-of-service-url: https://stackoverflow.com/
    group:
      test1:
        group-name: 分组名称
        api-rule: package
        api-rule-resources:
          - com.unilife
mybatis:
  mapper-locations: classpath:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true
logging:
  level:
    com.unilife: debug
    org.springframework.ai: debug
jwt:
  secret: qwertyuiopasdfghjklzxcvbnm
  expiration: 60 # 60秒过期时间，用于测试JWT过期逻辑
# 添加阿里云OSS配置
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:your-endpoint}
    accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:your-access-key-id}
    accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:your-access-key-secret}
    bucketName: ${ALIYUN_OSS_BUCKET_NAME:your-bucket-name}
    urlPrefix: ${ALIYUN_OSS_URL_PREFIX:https://your-bucket-name.oss-region.aliyuncs.com/}

# 应用自定义配置
app:
  ai:
    auto-title:
      enabled: true # 是否启用自动生成会话标题
      strategy: ai # 标题生成策略：simple(简单算法) 或 ai(AI生成)



